name: Code Coverage

on:
  push:
    branches: [main, develop, develop-4.14]
  pull_request:
    branches: [main, develop, develop-4.14]

jobs:
  coverage-all:
    runs-on: ubuntu-24.04
    timeout-minutes: 70
    env:
      WINEARCH: win64
      WINEPREFIX: /home/runner/.wine64
      WINEPATH: Z:\usr\lib\gcc\x86_64-w64-mingw32\13-posix
      TZ: UTC

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (Linux + MinGW/Wine)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            build-essential autoconf automake libtool pkg-config lcov \
            mingw-w64 mingw-w64-tools libz-mingw-w64-dev wine32 wine64 \
            wget unzip
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Fetch test data (once)
        run: |
          cd ..
          wget -q https://digitalcorpora.s3.amazonaws.com/corpora/drives/tsk-2024/sleuthkit_test_data.zip
          unzip -q sleuthkit_test_data.zip
          cd sleuthkit_test_data && make unpack
          find . -ls | grep -v '[.]git'
          echo "SLEUTHKIT_TEST_DATA_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Bootstrap (once)
        run: ./bootstrap

      # -------- Linux build/test/coverage --------
      - name: Linux configure
        run: |
          mkdir -p build-linux
          cd build-linux
          ../configure \
            CFLAGS="--coverage -fprofile-update=atomic" \
            CXXFLAGS="--coverage -fprofile-update=atomic" \
            LDFLAGS="--coverage"

      - name: Linux build
        run: |
          cd build-linux
          make -j"$(nproc)"

      - name: Linux tests
        run: |
          cd build-linux
          make check V=0

      - name: Linux coverage
        run: |
          cd build-linux
          lcov --capture --directory . --base-directory "$GITHUB_WORKSPACE" --output-file ../coverage.linux.info
          lcov --remove ../coverage.linux.info '/usr/*' --output-file ../coverage.linux.info
          lcov --list ../coverage.linux.info

      # -------- MinGW/Wine build/test/coverage --------
      - name: MinGW configure
        run: |
          mkdir -p build-mingw
          cd build-mingw
          ../configure --host=x86_64-w64-mingw32 --target=x86_64-w64-mingw32 \
            CFLAGS="--coverage" CXXFLAGS="--coverage" LDFLAGS="--coverage"

      - name: MinGW build
        run: |
          cd build-mingw
          make -j2

      - name: MinGW tests under Wine
        run: |
          cd build-mingw
          echo "Running tests under Wine..."
          make -j2 check VERBOSE=1 LOG_COMPILER=../scripts/wine_wrapper.sh || result=1
          # Print logs once (unique)
          find ../test -name '*.log' -o -name '*.trs' -print | sort -u | while read -r f; do
            printf '\n%79s\n' | tr ' ' '='
            echo "$f"
            cat "$f"
          done
          exit ${result:-0}

      - name: MinGW coverage
        run: |
          cd build-mingw
          lcov --capture --directory . --base-directory "$GITHUB_WORKSPACE" --output-file ../coverage.mingw.info
          lcov --remove ../coverage.mingw.info '/usr/*' --output-file ../coverage.mingw.info
          lcov --list ../coverage.mingw.info

      # -------- Merge & upload once --------
      - name: Merge coverage (dedupe)
        run: |
          lcov -a coverage.linux.info -a coverage.mingw.info -o coverage.all.info
          # Optional: drop extra noise
          lcov --remove coverage.all.info '*/.git/*' --output-file coverage.all.info || true
          lcov --list cov
